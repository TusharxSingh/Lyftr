<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyftr AI - Web Scraper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .input-section {
            margin-bottom: 30px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input[type="url"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="url"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            display: none;
        }
        
        .loading.active {
            display: block;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .error.active {
            display: block;
        }
        
        .sections {
            margin-top: 30px;
        }
        
        .section {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        
        .section-header {
            background: #f5f5f5;
            padding: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .section-header:hover {
            background: #eeeeee;
        }
        
        .section-content {
            padding: 15px;
            display: none;
        }
        
        .section-content.active {
            display: block;
        }
        
        .section-label {
            font-weight: bold;
            color: #333;
        }
        
        .section-type {
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .json-viewer {
            background: #f8f8f8;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .json-viewer pre {
            margin: 0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        
        .download-btn {
            margin-top: 20px;
            background: #28a745;
        }
        
        .download-btn:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 Lyftr AI - Web Scraper</h1>
        
        <div class="input-section">
            <div class="input-group">
                <input type="url" id="urlInput" placeholder="Enter URL to scrape (e.g., https://example.com)">
                <button id="scrapeBtn">Scrape</button>
            </div>
            <div class="error" id="errorMsg"></div>
            <div class="loading" id="loading">
                <p>🔄 Scraping in progress...</p>
            </div>
        </div>
        
        <div class="sections" id="sections"></div>
        
        <div class="json-viewer" id="jsonViewer" style="display: none;">
            <h3>JSON Output</h3>
            <pre id="jsonContent"></pre>
            <button class="download-btn" id="downloadBtn">Download JSON</button>
        </div>
    </div>
    
    <script src="/static/frontend.js"></script>
</body>
</html>
